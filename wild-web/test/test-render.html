<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wild Blueprint Rendering Test</title>
  <style>
    body { margin: 0; font-family: monospace; }
    #container { display: flex; height: 100vh; }
    #sidebar { width: 300px; padding: 10px; background: #1e1e1e; color: #ccc; overflow-y: auto; }
    #canvas { flex: 1; }
    button { margin: 5px 0; padding: 5px; width: 100%; }
    .error { color: #ff6b6b; }
    .success { color: #51cf66; }
  </style>
</head>
<body>
  <div id="container">
    <div id="sidebar">
      <h3>蓝图渲染测试</h3>
      <button onclick="loadBlueprint('cabin_v1')">加载 Cabin V1 (正常)</button>
      <button onclick="loadBlueprint('bieshu')">加载 别墅 (问题)</button>
      <button onclick="loadBlueprint('tiantan')">加载 天坛 (问题)</button>
      <div id="status"></div>
      <div id="stats"></div>
    </div>
    <canvas id="canvas"></canvas>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
    
    const status = document.getElementById('status');
    const stats = document.getElementById('stats');
    
    let scene, camera, renderer, controls;
    
    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a1a1a);
      
      camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(12, 10, 12);
      
      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
      renderer.setSize(window.innerWidth - 300, window.innerHeight);
      renderer.shadowMap.enabled = true;
      
      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 1.5, 0);
      controls.update();
      
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);
      
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(10, 20, 10);
      scene.add(directionalLight);
      
      const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x333333);
      scene.add(gridHelper);
      
      animate();
    }
    
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    
    window.loadBlueprint = async function(name) {
      status.innerHTML = `<p>加载 ${name}.wild...</p>`;
      stats.innerHTML = '';
      
      try {
        const response = await fetch(`/lantu/${name}.wild`);
        const text = await response.text();
        const blueprint = JSON.parse(text);
        
        status.innerHTML += `<p class="success">✓ 蓝图解析成功</p>`;
        status.innerHTML += `<p>元素数: ${blueprint.geometry.elements.length}</p>`;
        
        // 调用渲染引擎
        const { reconstructEntity } = await import('./src/wild-core/src/primitive/index');
        const entity = await reconstructEntity(blueprint);
        
        status.innerHTML += `<p class="success">✓ 场景重建成功</p>`;
        stats.innerHTML = `
          <h4>统计信息</h4>
          <p>网格数: ${entity.meshes.length}</p>
          <p>材质数: ${entity.materialParams?.length || 0}</p>
          <p>边界盒: ${JSON.stringify(entity.boundingBox.min)} to ${JSON.stringify(entity.boundingBox.max)}</p>
        `;
        
        // 清空场景
        while(scene.children.length > 3) {
          scene.remove(scene.children[3]);
        }
        
        // 渲染网格
        entity.meshes.forEach((meshData, i) => {
          const geometry = new THREE.BufferGeometry();
          geometry.setAttribute('position', new THREE.BufferAttribute(meshData.geometry, 3));
          
          if (meshData.indices) {
            geometry.setIndex(new THREE.BufferAttribute(meshData.indices, 1));
          }
          
          if (meshData.normals) {
            geometry.setAttribute('normal', new THREE.BufferAttribute(meshData.normals, 3));
          } else {
            geometry.computeVertexNormals();
          }
          
          const material = new THREE.MeshStandardMaterial({
            color: 0x808080,
            vertexColors: !!meshData.vertexColors
          });
          
          if (meshData.vertexColors) {
            geometry.setAttribute('color', new THREE.BufferAttribute(meshData.vertexColors, 3));
          }
          
          const mesh = new THREE.Mesh(geometry, material);
          const { position, rotation, scale } = meshData.transform;
          mesh.position.set(position[0], position[1], position[2]);
          mesh.rotation.set(rotation[0], rotation[1], rotation[2]);
          mesh.scale.set(scale[0], scale[1], scale[2]);
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          
          scene.add(mesh);
        });
        
        // 相机适配
        const bbox = entity.boundingBox;
        const center = new THREE.Vector3(
          (bbox.min[0] + bbox.max[0]) / 2,
          (bbox.min[1] + bbox.max[1]) / 2,
          (bbox.min[2] + bbox.max[2]) / 2
        );
        const size = new THREE.Vector3(
          bbox.max[0] - bbox.min[0],
          bbox.max[1] - bbox.min[1],
          bbox.max[2] - bbox.min[2]
        );
        const maxDim = Math.max(size.x, size.y, size.z);
        const distance = maxDim * 1.5;
        
        controls.target.copy(center);
        camera.position.set(
          center.x + distance,
          center.y + distance * 0.7,
          center.z + distance
        );
        controls.update();
        
      } catch (error) {
        status.innerHTML += `<p class="error">✗ 错误: ${error.message}</p>`;
        console.error(error);
      }
    };
    
    init();
  </script>
</body>
</html>
